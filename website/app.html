<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SuperApp — Interactive Preview</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{
  font-family:'Nunito','SF Pro Rounded',-apple-system,BlinkMacSystemFont,system-ui,sans-serif;
  background:#d8dce6;
  display:flex;flex-direction:column;align-items:center;
  justify-content:flex-start;min-height:100vh;padding:40px 20px 60px;
}
:root{--p:#D4830A;--p-lt:#F0A520;--p-g:linear-gradient(135deg,#D4830A,#F2C94C)}

/* top bar */
.top-bar{width:100%;max-width:480px;display:flex;align-items:center;justify-content:space-between;margin-bottom:32px}
.tb-back{display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:600;color:#888;text-decoration:none;transition:color .2s}
.tb-back:hover{color:#333}
.tb-back svg{width:16px;height:16px}
.tb-title{font-size:14px;font-weight:700;color:#333}
.tb-tabs{display:flex;gap:5px}
.tb-tab{padding:5px 11px;border-radius:6px;font-size:12px;font-weight:600;border:1px solid #ddd;background:#fff;color:#888;cursor:pointer;transition:all .2s;font-family:inherit}
.tb-tab.active{background:#D4830A;color:#fff;border-color:#D4830A}
.theme-toggle{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:50px;font-size:12px;font-weight:700;cursor:pointer;border:1.5px solid #ddd;background:#fff;color:#333;font-family:inherit;transition:all .2s}
.theme-toggle:hover{background:#f5f5f5}
.theme-toggle svg{width:14px;height:14px;flex-shrink:0}

/* iPhone 16 frame */
.phone-wrap{position:relative;width:393px}
.iphone16{
  width:393px;height:852px;
  background:linear-gradient(180deg,#2c2c2c 0%,#1a1a1a 100%);
  border-radius:56px;padding:13px;position:relative;
  box-shadow:
    0 0 0 1px rgba(255,255,255,.14),
    0 0 0 2.5px #111,
    0 0 0 3.5px rgba(255,255,255,.06),
    0 30px 80px rgba(0,0,0,.35),
    0 60px 140px rgba(0,0,0,.2),
    inset 0 1px 0 rgba(255,255,255,.12),
    inset 0 0 40px rgba(0,0,0,.3);
}
.sb-mute{position:absolute;left:-3.5px;top:108px;width:3.5px;height:30px;background:#1a1a1a;border-radius:2px 0 0 2px}
.sb-vol-up{position:absolute;left:-3.5px;top:158px;width:3.5px;height:62px;background:#1a1a1a;border-radius:2px 0 0 2px}
.sb-vol-dn{position:absolute;left:-3.5px;top:234px;width:3.5px;height:62px;background:#1a1a1a;border-radius:2px 0 0 2px}
.sb-power{position:absolute;right:-3.5px;top:176px;width:3.5px;height:90px;background:#1a1a1a;border-radius:0 2px 2px 0}

/* screen */
.iphone-screen{width:100%;height:100%;background:#fff;border-radius:44px;overflow:hidden;position:relative}

/* dynamic island */
.dynamic-island{
  position:absolute;top:12px;left:50%;transform:translateX(-50%);
  width:118px;height:34px;background:#000;border-radius:20px;z-index:30;
  display:flex;align-items:center;justify-content:center;gap:8px;
}
.di-cam{width:10px;height:10px;border-radius:50%;background:#111;border:1.5px solid #2a2a2a;position:relative}
.di-cam::after{content:'';position:absolute;top:2px;left:2px;width:3px;height:3px;border-radius:50%;background:rgba(100,160,255,.35)}

/* status bar */
.status-bar{
  position:absolute;top:0;left:0;right:0;height:54px;
  display:flex;align-items:flex-end;justify-content:space-between;
  padding:0 26px 10px;z-index:25;background:#fff;
}
.sb-time{font-size:15px;font-weight:700;color:#111;letter-spacing:-.3px}
.sb-icons{display:flex;align-items:center;gap:5px}
.sb-icons svg{width:16px;height:16px}

/* viewport */
.screen-viewport{position:absolute;top:54px;left:0;right:0;bottom:82px;overflow:hidden}
.isc{
  position:absolute;top:0;left:0;right:0;bottom:0;
  overflow-y:auto;overflow-x:hidden;
  transform:translateX(100%);
  transition:transform .34s cubic-bezier(.25,.46,.45,.94);
  background:#fff;scrollbar-width:none;
}
.isc::-webkit-scrollbar{display:none}
.isc.active{transform:translateX(0)}

/* bottom nav */
.bnav{
  position:absolute;bottom:0;left:0;right:0;height:82px;
  background:rgba(255,255,255,.96);backdrop-filter:blur(20px);
  border-top:1px solid rgba(0,0,0,.07);
  display:flex;align-items:flex-start;justify-content:space-around;
  padding-top:10px;z-index:25;
}
.bni{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;color:#bbb;transition:color .2s;-webkit-tap-highlight-color:transparent;user-select:none}
.bni.active{color:#D4830A}
.bni svg{width:24px;height:24px}
.bni-lbl{font-size:10px;font-weight:600}

/* bottom nav corner fill */
.bnav-fill{position:absolute;bottom:0;left:0;right:0;height:82px;background:rgba(255,255,255,.96);z-index:24;pointer-events:none}
.dark-theme .bnav-fill{background:#121212}

/* home indicator */
.home-ind{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);width:130px;height:5px;background:#111;border-radius:3px;opacity:.18;z-index:26;pointer-events:none}

/* ── SHARED SCREEN ATOMS ── */
.sc-hd{padding:10px 20px 8px;display:flex;align-items:center;justify-content:space-between}
.sc-ht{font-size:18px;font-weight:800;color:#111;letter-spacing:-.4px}
.sc-back{display:inline-flex;align-items:center;gap:3px;font-size:14px;font-weight:600;color:var(--p);cursor:pointer;border:none;background:none;font-family:inherit;padding:0;-webkit-tap-highlight-color:transparent}
.sc-back svg{width:18px;height:18px}
.sc-av{width:36px;height:36px;border-radius:50%;background:var(--p-g);display:flex;align-items:center;justify-content:center;font-size:13px;color:#fff;font-weight:800;flex-shrink:0;cursor:pointer}
.sec-hd{padding:4px 20px 8px;font-size:11px;font-weight:700;color:#bbb;text-transform:uppercase;letter-spacing:.8px}

/* ── HOME ── */
.home-top{padding:10px 20px 6px;display:flex;align-items:center;justify-content:space-between}
.home-greet-sub{font-size:12px;color:#999;font-weight:500}
.home-greet-name{font-size:20px;font-weight:800;color:#111;letter-spacing:-.4px;margin-top:1px}
.bal-block{text-align:center;padding:12px 20px 8px}
.bal-lbl{font-size:12px;color:#999;font-weight:500;margin-bottom:2px}
.bal-amt{font-size:38px;font-weight:900;color:#111;letter-spacing:-.04em;line-height:1}
.bal-chg{font-size:13px;color:#16a34a;font-weight:700;margin-top:4px;display:flex;align-items:center;justify-content:center;gap:3px}

.card{margin:4px 20px 12px;background:var(--p-g);border-radius:18px;padding:16px 18px;color:#fff;position:relative;overflow:hidden;box-shadow:0 8px 24px rgba(212,131,10,.3);cursor:pointer;-webkit-tap-highlight-color:transparent}
.card::before{content:'';position:absolute;right:-20px;top:-20px;width:100px;height:100px;border-radius:50%;background:rgba(255,255,255,.12)}
.card::after{content:'';position:absolute;left:-15px;bottom:-15px;width:80px;height:80px;border-radius:50%;background:rgba(0,0,0,.07)}
.card-lbl{font-size:10px;opacity:.7;font-weight:700;letter-spacing:1px}
.card-num{font-size:13px;font-weight:700;margin-top:12px;letter-spacing:2.5px;opacity:.88}
.card-row{display:flex;justify-content:space-between;margin-top:8px}
.card-sub{font-size:10px;opacity:.6;margin-bottom:2px}
.card-val{font-size:12px;font-weight:700}

.quick-acts{display:flex;gap:8px;padding:0 20px 12px}
.qa{flex:1;background:#f7f7f7;border:1px solid #eee;border-radius:14px;padding:12px 4px;text-align:center;cursor:pointer;transition:all .15s;-webkit-tap-highlight-color:transparent;user-select:none}
.qa:active{background:var(--p-g);border-color:transparent;transform:scale(.94)}
.qa:active .qa-lbl{color:#fff}
.qa-ico{font-size:19px;margin-bottom:4px;display:block;line-height:1}
.qa-lbl{font-size:11px;font-weight:700;color:#555;transition:color .15s}

.tx-row{display:flex;align-items:center;gap:12px;padding:11px 20px;border-bottom:1px solid #f4f4f4;cursor:pointer;transition:background .12s;-webkit-tap-highlight-color:transparent;user-select:none}
.tx-row:active{background:#f9f9f9}
.tx-ico{width:42px;height:42px;border-radius:12px;background:#f5f5f5;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.tx-name{font-size:14px;font-weight:700;color:#111}
.tx-sub{font-size:11px;color:#aaa;margin-top:1px}
.tx-amt{margin-left:auto;font-size:15px;font-weight:800}
.tx-amt.neg{color:#ef4444}
.tx-amt.pos{color:#16a34a}

/* ── PAY ── */
.amt-display{text-align:center;padding:18px 20px 10px;cursor:pointer;-webkit-tap-highlight-color:transparent;user-select:none}
.amt-curr{font-size:20px;color:#bbb;vertical-align:super;font-weight:600}
.amt-big{font-size:52px;font-weight:900;color:#111;letter-spacing:-.05em;line-height:1;transition:color .2s}
.amt-hint{font-size:11px;color:#bbb;margin-top:5px}
.contacts-row{padding:0 20px 12px}
.contacts-scroll{display:flex;gap:12px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none}
.contacts-scroll::-webkit-scrollbar{display:none}
.contact{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;flex-shrink:0;-webkit-tap-highlight-color:transparent;transition:transform .15s}
.contact:active{transform:scale(.92)}
.contact-av{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;font-weight:800;transition:box-shadow .2s,transform .2s}
.contact.selected .contact-av{box-shadow:0 0 0 3px #fff,0 0 0 5px var(--p);transform:scale(1.08)}
.contact-name{font-size:11px;font-weight:600;color:#777}
.contact.selected .contact-name{color:var(--p);font-weight:800}
.field{margin:0 20px 10px;background:#f8f8f8;border:1px solid #eee;border-radius:12px;padding:13px 15px;display:flex;align-items:center;gap:10px}
.field-lbl{font-size:12px;color:#bbb;flex:1;font-weight:500}
.field-val{font-size:13px;font-weight:700;color:#111}
.send-btn{
  margin:6px 20px 10px;background:var(--p-g);color:#fff;border:none;
  border-radius:14px;padding:15px;font-size:15px;font-weight:800;
  cursor:pointer;width:calc(100% - 40px);
  box-shadow:0 6px 20px rgba(212,131,10,.3);
  font-family:inherit;transition:opacity .2s,transform .12s;
  -webkit-tap-highlight-color:transparent;
}
.send-btn:active{opacity:.88;transform:scale(.98)}
.send-btn:disabled{opacity:.6;cursor:default}

/* numpad overlay */
.numpad-overlay{
  position:absolute;bottom:82px;left:0;right:0;
  background:#fff;border-top:1px solid #f0f0f0;
  border-radius:20px 20px 0 0;
  box-shadow:0 -8px 30px rgba(0,0,0,.08);
  z-index:40;
  transform:translateY(100%);
  transition:transform .3s cubic-bezier(.25,.46,.45,.94);
  padding-bottom:8px;
}
.numpad-overlay.show{transform:translateY(0)}
.np-header{padding:10px 20px 6px;display:flex;align-items:center;justify-content:space-between}
.np-title{font-size:13px;font-weight:700;color:#999}
.np-close{font-size:22px;color:#ccc;cursor:pointer;border:none;background:none;line-height:1;padding:0}
.np-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:2px;padding:0 4px}
.np-key{
  padding:14px 4px;text-align:center;font-size:22px;font-weight:600;color:#111;
  cursor:pointer;border:none;background:none;font-family:inherit;border-radius:10px;
  transition:background .1s;-webkit-tap-highlight-color:transparent;
}
.np-key:active{background:#f5f5f5}
.np-key.del{font-size:18px;color:#888}
.np-key.confirm{background:var(--p-g);color:#fff;border-radius:10px;font-size:16px;font-weight:800;box-shadow:0 4px 12px rgba(212,131,10,.3)}
.np-key.confirm:active{opacity:.88}

/* send success overlay */
.send-success{
  position:absolute;top:54px;left:0;right:0;bottom:82px;
  background:#fff;z-index:50;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;
  opacity:0;pointer-events:none;
  transition:opacity .3s ease;
}
.send-success.show{opacity:1;pointer-events:all}
.success-circle{
  width:80px;height:80px;border-radius:50%;
  background:var(--p-g);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 8px 28px rgba(212,131,10,.35);
  animation:none;
}
.success-circle.pop{animation:pop .4s cubic-bezier(.34,1.56,.64,1)}
@keyframes pop{0%{transform:scale(0)}100%{transform:scale(1)}}
.success-check{font-size:36px;line-height:1}
.success-title{font-size:22px;font-weight:900;color:#111;letter-spacing:-.4px}
.success-sub{font-size:14px;color:#aaa;font-weight:500}
.success-done{margin-top:16px;background:var(--p-g);color:#fff;border:none;border-radius:12px;padding:13px 40px;font-size:15px;font-weight:800;cursor:pointer;font-family:inherit;box-shadow:0 4px 16px rgba(212,131,10,.3);-webkit-tap-highlight-color:transparent}
.success-done:active{opacity:.88;transform:scale(.97)}

/* ── GOV ── */
@keyframes spin{to{transform:rotate(360deg)}}
.gov-spinner{width:16px;height:16px;border:2px solid #ddd;border-top-color:var(--p);border-radius:50%;animation:spin .7s linear infinite}

.gov-news-banner{margin:0 16px 14px;border-radius:20px;overflow:hidden;position:relative;height:160px;cursor:pointer;-webkit-tap-highlight-color:transparent}
.gov-news-banner:active{opacity:.92}
.gov-news-banner img{width:100%;height:100%;object-fit:cover;object-position:center top;display:block}
.gov-news-overlay{position:absolute;inset:0;background:linear-gradient(to right,rgba(0,0,0,.72) 55%,rgba(0,0,0,.1) 100%);padding:16px}
.gov-news-tag{display:inline-block;background:var(--p);color:#fff;font-size:9px;font-weight:800;padding:3px 8px;border-radius:50px;letter-spacing:.06em;text-transform:uppercase;margin-bottom:8px}
.gov-news-title{font-size:15px;font-weight:900;color:#fff;line-height:1.3;max-width:180px}
.gov-news-sub{font-size:10px;font-weight:500;color:rgba(255,255,255,.7);margin-top:5px;max-width:175px;line-height:1.4}

/* Gov video carousel */
.gov-vid-wrap{margin:0 0 14px}
.gov-vid-hd{display:flex;align-items:center;justify-content:space-between;padding:0 16px;margin-bottom:10px}
.gov-vid-ttl{font-size:13px;font-weight:800;color:#111}
.gov-vid-scroll{display:flex;gap:10px;padding:0 16px;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.gov-vid-scroll::-webkit-scrollbar{display:none}
.gov-vid-card{flex-shrink:0;width:180px;height:110px;border-radius:16px;overflow:hidden;position:relative;cursor:pointer;-webkit-tap-highlight-color:transparent}
.gov-vid-card:active{opacity:.88}
.gov-vid-card img{width:100%;height:100%;object-fit:cover;object-position:center;display:block}
.gov-vid-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.75) 50%,rgba(0,0,0,.1) 100%)}
.gov-vid-play{position:absolute;top:50%;left:50%;transform:translate(-50%,-60%);width:36px;height:36px;background:rgba(255,255,255,.22);backdrop-filter:blur(6px);border-radius:50%;display:flex;align-items:center;justify-content:center}
.gov-vid-play svg{width:14px;height:14px;fill:#fff;margin-left:2px}
.gov-vid-dur{position:absolute;top:8px;right:8px;background:rgba(0,0,0,.55);color:#fff;font-size:9px;font-weight:700;padding:2px 6px;border-radius:4px}
.gov-vid-info{position:absolute;bottom:0;left:0;right:0;padding:8px 10px}
.gov-vid-label{font-size:8px;font-weight:800;color:var(--p);text-transform:uppercase;letter-spacing:.06em;margin-bottom:2px}
.gov-vid-name{font-size:11px;font-weight:800;color:#fff;line-height:1.3}

/* ── Messages page ── */
.msg-wrap{background:#f5f5f7;min-height:100%;padding-bottom:100px}
.msg-hd{padding:16px 16px 12px;display:flex;align-items:center;justify-content:space-between}
.msg-hd-title{font-size:26px;font-weight:900;color:#111;letter-spacing:-.03em;flex:1;text-align:center}
.msg-hd-edit{width:36px;height:36px;border-radius:50%;background:#fff;box-shadow:0 2px 10px rgba(0,0,0,.08);display:flex;align-items:center;justify-content:center;cursor:pointer}
.msg-hd-edit svg{width:17px;height:17px;fill:none;stroke:#1c1c1e;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}

.msg-support{margin:0 16px 12px;background:#fff;border-radius:18px;padding:14px 16px;display:flex;align-items:center;gap:12px;box-shadow:0 2px 12px rgba(0,0,0,.06);cursor:pointer;-webkit-tap-highlight-color:transparent;transition:opacity .1s}
.msg-support:active{opacity:.85}
.msg-support-av{width:48px;height:48px;border-radius:14px;background:var(--p-g);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.msg-support-av svg{width:22px;height:22px;fill:none;stroke:#fff;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.msg-support-info{flex:1}
.msg-support-name{font-size:15px;font-weight:800;color:#111}
.msg-support-sub{font-size:12px;color:#aaa;font-weight:500;margin-top:1px}
.msg-support-time{font-size:11px;color:#bbb;font-weight:500;align-self:flex-start;margin-top:2px}

.msg-promo{margin:0 16px 14px;border-radius:18px;overflow:hidden;position:relative;height:130px;cursor:pointer;-webkit-tap-highlight-color:transparent}
.msg-promo:active{opacity:.92}
.msg-promo img{width:100%;height:100%;object-fit:cover;object-position:center 40%;display:block}
.msg-promo-overlay{position:absolute;inset:0;background:linear-gradient(to right,rgba(0,0,0,.68) 50%,rgba(0,0,0,.15) 100%);padding:16px;display:flex;flex-direction:column;justify-content:center}
.msg-promo-tag{display:inline-block;background:var(--p);color:#fff;font-size:9px;font-weight:800;padding:3px 8px;border-radius:50px;letter-spacing:.06em;text-transform:uppercase;margin-bottom:7px;align-self:flex-start}
.msg-promo-title{font-size:16px;font-weight:900;color:#fff;line-height:1.3;margin-bottom:3px}
.msg-promo-sub{font-size:11px;color:rgba(255,255,255,.72);font-weight:500}

.msg-pin-lbl{font-size:11px;font-weight:700;color:#bbb;padding:0 16px;margin-bottom:6px;letter-spacing:.04em;text-transform:uppercase}
.msg-sec-lbl{font-size:11px;font-weight:700;color:#bbb;padding:4px 16px;margin-bottom:8px;letter-spacing:.04em;text-transform:uppercase}
.msg-card{margin:0 16px 10px;background:#fff;border-radius:18px;overflow:hidden;box-shadow:0 2px 10px rgba(0,0,0,.05)}
.msg-row{display:flex;align-items:center;gap:12px;padding:13px 16px;border-bottom:1px solid #f5f5f7;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:background .1s}
.msg-row:last-child{border-bottom:none}
.msg-row:active{background:#fafafa}
.msg-av{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:18px}
.msg-av svg{width:22px;height:22px;fill:none;stroke:#fff;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.msg-info{flex:1;min-width:0}
.msg-name{font-size:14px;font-weight:800;color:#111}
.msg-preview{font-size:12px;color:#aaa;font-weight:500;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.msg-right{display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0}
.msg-time{font-size:11px;color:#bbb;font-weight:500}
.msg-badge{background:#999;color:#fff;font-size:10px;font-weight:800;min-width:20px;height:20px;border-radius:50px;display:flex;align-items:center;justify-content:center;padding:0 5px}
.msg-badge.gold{background:#999}

/* Gov search bar */
.gov-search{margin:0 16px 14px;display:flex;align-items:center;gap:10px;background:#fff;border-radius:14px;padding:11px 14px;box-shadow:0 1px 4px rgba(0,0,0,.05);cursor:pointer;-webkit-tap-highlight-color:transparent}
.gov-search svg{width:16px;height:16px;fill:none;stroke:#bbb;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
.gov-search-txt{font-size:14px;color:#bbb;font-weight:500;flex:1}
.gov-search-filter{width:32px;height:32px;border-radius:9px;background:#f0f0f2;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.gov-search-filter svg{width:15px;height:15px;fill:none;stroke:#888;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}

.gov-quick-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:0 16px 14px}
.gov-quick-card{background:#fff;border-radius:18px;padding:16px;cursor:pointer;box-shadow:0 2px 12px rgba(0,0,0,.06);-webkit-tap-highlight-color:transparent;transition:opacity .12s}
.gov-quick-card:active{opacity:.8}

.exch-flag-wrap{width:36px;height:36px;border-radius:50%;overflow:hidden;background:#f0f0f2;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;line-height:1}
.exch-you-lbl{font-size:10px;font-weight:600;color:#bbb;text-transform:uppercase;letter-spacing:.3px;margin-bottom:2px}
.exch-cur-code{font-size:13px;font-weight:800;color:#111;line-height:1.2}
.exch-cur-name{font-size:10px;color:#aaa;font-weight:500;margin-top:1px}
.exch-input{border:none;outline:none;font-size:18px;font-weight:800;color:#111;font-family:inherit;width:120px;text-align:right;background:transparent;-moz-appearance:textfield;appearance:textfield}
.exch-input::-webkit-outer-spin-button,.exch-input::-webkit-inner-spin-button{-webkit-appearance:none}
.exch-input-to{color:#999}
.exch-divider{display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-top:1px solid #f5f5f5;border-bottom:1px solid #f5f5f5;margin:2px 0}
.exch-rate-lbl{font-size:11px;font-weight:600;color:#bbb}
.exch-swap-btn{width:32px;height:32px;border-radius:50%;background:var(--p-g);display:flex;align-items:center;justify-content:center;cursor:pointer;-webkit-tap-highlight-color:transparent;flex-shrink:0;box-shadow:0 4px 12px rgba(212,131,10,.28);transition:transform .25s cubic-bezier(.34,1.56,.64,1);border:none}
.exch-swap-btn:active{transform:scale(.88) rotate(180deg)}
.exch-swap-btn svg{width:15px;height:15px}
.exch-action{margin-top:12px;background:var(--p-g);color:#fff;border:none;border-radius:12px;padding:12px;font-size:13px;font-weight:800;cursor:pointer;width:100%;font-family:inherit;box-shadow:0 4px 14px rgba(212,131,10,.25);-webkit-tap-highlight-color:transparent;transition:opacity .15s,transform .12s}
.exch-action:active{opacity:.88;transform:scale(.98)}
/* Rates table */
.rates-card{margin:0 16px 14px;background:#fff;border-radius:22px;padding:12px 14px;box-shadow:0 3px 20px rgba(0,0,0,.08)}
.rates-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.rates-hd-ttl{font-size:12px;font-weight:600;color:#aaa;letter-spacing:0;text-transform:none}
.rates-hd-base{font-size:10px;font-weight:700;color:var(--p);background:rgba(212,131,10,.1);border-radius:6px;padding:2px 7px}
.rates-thead{display:flex;align-items:center;padding-bottom:6px;border-bottom:1px solid #f0f0f2}
.rates-thead-spacer{flex:1}
.rates-col-lbl{width:56px;text-align:right;font-size:10px;font-weight:600;color:#bbb;text-transform:uppercase;letter-spacing:.3px}
.rate-row{display:flex;align-items:center;padding:6px 0;border-top:1px solid #f8f8f8}
.rate-flag{width:26px;height:26px;border-radius:50%;overflow:hidden;background:#f0f0f2;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;margin-right:8px}
.rate-info{flex:1;min-width:0}
.rate-code{font-size:12px;font-weight:800;color:#111}
.rate-name{font-size:10px;font-weight:500;color:#bbb}
.rate-buy{width:56px;text-align:right;font-size:11px;font-weight:700;color:#111}
.rate-sell{width:56px;text-align:right;font-size:11px;font-weight:600;color:#888}
.rate-chg{width:40px;text-align:right;font-size:10px;font-weight:700}
.rate-chg.pos{color:#16a34a}
.rate-chg.neg{color:#ef4444}

/* My Bank pill v2: bigger, colored icons */
.mybank-pill{padding:11px 18px;font-size:13px;font-weight:600;border-radius:50px;gap:9px;color:#111;border-color:#e0e0e0}
.mbpil-ico-wrap{width:20px;height:20px;border-radius:0;background:transparent;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.mbpil-ico-wrap svg{width:20px;height:20px;fill:none;stroke:var(--p);stroke-width:1.9;stroke-linecap:round;stroke-linejoin:round;overflow:visible}
.myb-card{border-top:none}
.myb-cthumb{width:50px;height:32px;border-radius:8px}
.myb-cname{font-size:14px;font-weight:700}
.myb-csub{font-size:11px;color:#aaa}
.myb-cbal{font-size:15px;font-weight:800}
.mybank-goto{margin:0 14px 14px;padding:14px;font-size:14px;font-weight:700;color:#444;width:calc(100% - 28px);border-radius:14px}
.myb-cthumb{width:56px;height:36px;border-radius:9px}
.myb-cthumb::before{width:36px;height:36px}

/* ── Home feed ── */
#s-home{background:#f5f5f7}
.home-scroll{background:#f5f5f7;padding-bottom:100px}

/* Stories */
.stories-scroll{display:flex;gap:12px;padding:8px 16px 14px;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.stories-scroll::-webkit-scrollbar{display:none}
.story-item{display:flex;flex-direction:column;align-items:center;gap:5px;flex-shrink:0;cursor:pointer;-webkit-tap-highlight-color:transparent}
.story-ring{width:62px;height:62px;border-radius:50%;padding:2.5px;background:linear-gradient(135deg,#D4830A,#F2C94C);flex-shrink:0}
.story-ring.seen{background:#e0e0e0}
.story-av{width:100%;height:100%;border-radius:50%;overflow:hidden;border:2px solid #f5f5f7;display:flex;align-items:center;justify-content:center;font-size:22px;background:#fff}
.story-av img{width:100%;height:100%;object-fit:cover;object-position:top center;display:block}
.story-lbl{font-size:10px;font-weight:600;color:#333;max-width:64px;text-align:center;line-height:1.25;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* Home section header */
.home-sec-hd{display:flex;align-items:center;justify-content:space-between;padding:0 16px 8px}
.home-sec-ttl{font-size:15px;font-weight:900;color:#111;letter-spacing:-.02em}
.home-sec-all{font-size:12px;font-weight:700;color:var(--p)}

/* Post cards */
.post-card{margin:0 16px 12px;background:#fff;border-radius:20px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,.06)}
.post-hd{display:flex;align-items:center;gap:10px;padding:14px 14px 10px}
.post-av{width:42px;height:42px;border-radius:13px;display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden;box-shadow:0 4px 12px rgba(0,0,0,.18)}
.post-av img{width:100%;height:100%;object-fit:cover;display:block}
.post-av svg{width:20px;height:20px;fill:none;stroke:#fff;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.post-av-finance,.post-av-roads,.post-av-digital,.post-av-health{background:#eee}
.post-org{font-size:13px;font-weight:800;color:#111}
.post-time{font-size:10px;font-weight:500;color:#aaa;margin-top:1px}
.post-tag{font-size:9px;font-weight:800;padding:3px 9px;border-radius:50px;background:rgba(212,131,10,.12);color:var(--p);margin-left:auto;flex-shrink:0;white-space:nowrap}
.post-body{padding:0 14px 14px;font-size:13px;font-weight:600;color:#333;line-height:1.55}
.post-img{width:100%;height:180px;object-fit:cover;display:block}
.post-img-caption{padding:10px 14px 14px;font-size:12px;font-weight:600;color:#555;line-height:1.5}
.post-footer{display:flex;align-items:center;gap:14px;padding:10px 14px 12px;border-top:1px solid #f5f5f7}
.post-foot-btn{display:flex;align-items:center;gap:5px;font-size:12px;font-weight:700;cursor:pointer;-webkit-tap-highlight-color:transparent;-webkit-user-select:none}
.post-foot-btn.like{color:#ef4444}
.post-foot-btn.like svg{fill:#ef4444;stroke:#ef4444}
.post-foot-btn.comment{color:#999}
.post-foot-btn.comment svg{stroke:#999}
.post-foot-btn.share{color:#999;margin-left:auto}
.post-foot-btn.share svg{stroke:#999}
.post-foot-btn svg{width:16px;height:16px;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}

/* Home promo banner */
.home-promo{margin:0 16px 14px;border-radius:20px;overflow:hidden;position:relative;height:130px;cursor:pointer}
.home-promo img{width:100%;height:100%;object-fit:cover;object-position:center;display:block}
.home-promo-overlay{position:absolute;inset:0;background:linear-gradient(to right,rgba(0,0,0,.72) 50%,rgba(0,0,0,.15) 100%);padding:18px}
.home-promo-tag{display:inline-block;background:var(--p);color:#fff;font-size:9px;font-weight:800;padding:3px 8px;border-radius:50px;text-transform:uppercase;margin-bottom:6px}
.home-promo-title{font-size:16px;font-weight:900;color:#fff;line-height:1.25}
.home-promo-sub{font-size:11px;color:rgba(255,255,255,.75);margin-top:3px;font-weight:500}

/* Home reels */
.home-reels-scroll{display:flex;gap:10px;padding:0 16px 16px;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.home-reels-scroll::-webkit-scrollbar{display:none}
.home-reel{flex-shrink:0;width:130px;height:200px;border-radius:16px;overflow:hidden;position:relative;cursor:pointer}
.home-reel img{width:100%;height:100%;object-fit:cover;object-position:center;display:block}
.home-reel-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.8) 45%,rgba(0,0,0,.05) 100%)}
.home-reel-play{position:absolute;top:12px;right:12px;width:28px;height:28px;background:rgba(255,255,255,.2);backdrop-filter:blur(6px);border-radius:50%;display:flex;align-items:center;justify-content:center}
.home-reel-play svg{width:12px;height:12px;fill:#fff;margin-left:2px}
.home-reel-lbl{position:absolute;bottom:12px;left:12px;right:12px;font-size:11px;font-weight:800;color:#fff;line-height:1.35;text-shadow:0 1px 4px rgba(0,0,0,.5)}
.home-reel-views{position:absolute;bottom:12px;right:12px;font-size:10px;font-weight:600;color:rgba(255,255,255,.7)}

/* ── Operations page ── */
.ops-wrap{padding-bottom:100px;background:#f5f5f7;min-height:100%}
.ops-hd{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 6px}
.ops-hd-user{width:36px;height:36px;border-radius:50%;overflow:hidden;flex-shrink:0;box-shadow:0 2px 10px rgba(0,0,0,.15);cursor:pointer;-webkit-tap-highlight-color:transparent}
.ops-hd-user img{width:100%;height:100%;object-fit:cover;object-position:top center;display:block}
.ops-hd-title{font-size:24px;font-weight:900;color:#111;letter-spacing:-.03em;flex:1;text-align:center}
.ops-search{margin:0 16px 12px;display:flex;align-items:center;gap:10px;background:#fff;border-radius:14px;padding:10px 14px;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.ops-search svg{width:16px;height:16px;fill:none;stroke:#bbb;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
.ops-search-txt{font-size:14px;color:#bbb;font-weight:500}

.ops-section{margin:0 16px 12px;background:#fff;border-radius:20px;box-shadow:0 2px 10px rgba(0,0,0,.05)}
.ops-sec-hd{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 4px}
.ops-sec-lbl{font-size:12px;font-weight:600;color:#aaa;letter-spacing:.02em}
.ops-sec-all{font-size:12px;font-weight:700;color:var(--p);cursor:pointer}

.ops-transfer-scroll{display:flex;flex-wrap:wrap;gap:10px 0;padding:10px 12px 14px}
.ops-tr-item{display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer;flex-shrink:0;-webkit-tap-highlight-color:transparent;width:33.333%}
.ops-tr-ico{width:60px;height:60px;border-radius:18px;background:#f0f0f2;border:none;display:flex;align-items:center;justify-content:center;transition:background .12s;box-shadow:none}
.ops-tr-item:active .ops-tr-ico{background:#e4e4e8}
.ops-tr-ico svg{width:24px;height:24px;fill:none;stroke:#1c1c1e;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round}
.ops-tr-lbl{font-size:10px;font-weight:600;color:#555;text-align:center;max-width:66px;line-height:1.3}

.ops-promo{margin:0 16px 16px;border-radius:20px;padding:18px 20px;background:#000;display:flex;align-items:center;justify-content:space-between;overflow:hidden;position:relative;cursor:pointer;-webkit-tap-highlight-color:transparent;min-height:110px}
.ops-promo-bg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center;display:block;opacity:.55}
.ops-promo-overlay{position:absolute;inset:0;background:rgba(0,0,0,.35)}
.ops-promo:active{opacity:.92}
.ops-promo-txt{}
.ops-promo-tag{font-size:10px;font-weight:700;color:rgba(255,255,255,.7);letter-spacing:.08em;text-transform:uppercase;margin-bottom:4px}
.ops-promo-title{font-size:16px;font-weight:900;color:#fff;line-height:1.25;margin-bottom:2px}
.ops-promo-sub{font-size:11px;font-weight:500;color:rgba(255,255,255,.75)}
.ops-promo-ico{width:64px;height:64px;background:rgba(255,255,255,.15);border-radius:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ops-promo-ico svg{width:32px;height:32px;fill:none;stroke:#fff;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round}

.ops-pay-row{display:flex;align-items:center;gap:14px;padding:13px 16px;border-bottom:1px solid #f5f5f7;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:background .1s}
.ops-pay-row:last-child{border-bottom:none}
.ops-pay-row:active{background:#fafafa}
.ops-pay-ico{width:44px;height:44px;border-radius:13px;background:#f0f0f2;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ops-pay-ico svg{width:20px;height:20px;fill:none;stroke:#1c1c1e;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.ops-pay-info{flex:1}
.ops-pay-name{font-size:14px;font-weight:700;color:#111}
.ops-pay-sub{font-size:11px;font-weight:500;color:#aaa;margin-top:1px}
.ops-pay-arr{color:#ccc;font-size:18px;font-weight:300}

/* ── Two-col row ── */
.ops-two-col{display:flex;gap:8px;margin:0 16px 8px;align-items:stretch}
.ops-two-col .ops-chart-card{flex:1;margin:0;min-width:0}

/* ── Activity card ── */
.ops-act-card{width:148px;flex-shrink:0;background:#fff;border-radius:22px;padding:12px 10px;box-shadow:0 2px 10px rgba(0,0,0,.05);display:flex;flex-direction:column}
.ops-act-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.ops-act-ttl{font-size:13px;font-weight:900;color:#111}
.ops-act-all{font-size:11px;font-weight:700;color:var(--p);cursor:pointer}
.ops-act-row{display:flex;align-items:center;gap:7px;padding:6px 0;border-bottom:1px solid #f5f5f7;cursor:pointer;-webkit-tap-highlight-color:transparent}
.ops-act-row:last-child{border-bottom:none;padding-bottom:0}
.ops-act-ico{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.ops-act-info{flex:1;min-width:0}
.ops-act-name{font-size:11px;font-weight:700;color:#111;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ops-act-date{font-size:9px;font-weight:500;color:#bbb;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ops-act-amt{font-size:11px;font-weight:800;flex-shrink:0;white-space:nowrap}
.ops-act-amt.minus{color:#ef4444}
.ops-act-amt.plus{color:#10b981}

/* ── Chart stats card ── */
.ops-chart-card{margin:0 16px 8px;background:#1c1c1e;border-radius:22px;padding:14px 16px 14px;box-shadow:0 6px 24px rgba(0,0,0,.22);overflow:hidden}
.ops-chart-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:2px}
.ops-chart-ttl{font-size:12px;font-weight:600;color:rgba(255,255,255,.45)}
.ops-chart-chg{font-size:12px;font-weight:800;color:#10b981}
.ops-chart-amt{font-size:26px;font-weight:900;color:#fff;letter-spacing:-.03em;margin-bottom:10px;line-height:1}
.ops-chart-wrap{margin:0 -16px;height:60px}
.ops-chart-wrap svg{width:100%;height:100%;display:block}
.ops-chart-periods{display:flex;gap:3px;margin-top:10px;padding:3px;background:rgba(255,255,255,.07);border-radius:12px}
.ops-chart-per{flex:1;text-align:center;padding:6px 0;font-size:11px;font-weight:700;color:rgba(255,255,255,.38);border-radius:9px;cursor:pointer;transition:all .18s;-webkit-tap-highlight-color:transparent;user-select:none}
.ops-chart-per.active{background:var(--p);color:#fff;box-shadow:0 2px 8px rgba(212,131,10,.4)}
.ops-chart-stats{display:flex;margin-top:10px;padding-top:10px;border-top:1px solid rgba(255,255,255,.08)}
.ops-chart-stat{flex:1;text-align:center}
.ops-chart-stat+.ops-chart-stat{border-left:1px solid rgba(255,255,255,.08)}
.ops-chart-stat-lbl{font-size:10px;font-weight:500;color:rgba(255,255,255,.38);margin-bottom:4px}
.ops-chart-stat-val{font-size:13px;font-weight:900;color:#fff}

/* ── Transactions ── */
.ops-txn-wrap{margin:0 16px 12px;background:#fff;border-radius:20px;box-shadow:0 2px 10px rgba(0,0,0,.05);overflow:hidden}
.ops-txn-hd{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 6px}
.ops-txn-ttl{font-size:15px;font-weight:900;color:#111}
.ops-txn-all{font-size:12px;font-weight:700;color:var(--p);cursor:pointer}
.ops-txn-date{font-size:11px;font-weight:700;color:#bbb;padding:8px 16px 4px;letter-spacing:.03em;text-transform:uppercase}
.ops-txn-row{display:flex;align-items:center;gap:12px;padding:11px 16px;border-top:1px solid #f5f5f7;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:background .1s}
.ops-txn-row:active{background:#fafafa}
.ops-txn-av{width:42px;height:42px;border-radius:13px;background:#f0f0f2;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:18px}
.ops-txn-av svg{width:20px;height:20px;fill:none;stroke:#1c1c1e;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.ops-txn-info{flex:1;min-width:0}
.ops-txn-name{font-size:14px;font-weight:700;color:#111}
.ops-txn-sub{font-size:11px;font-weight:500;color:#aaa;margin-top:1px}
.ops-txn-right{text-align:right;flex-shrink:0}
.ops-txn-amt{font-size:14px;font-weight:800;color:#111}
.ops-txn-amt.minus{color:#ef4444}
.ops-txn-amt.plus{color:#10b981}
.ops-txn-type{font-size:10px;font-weight:500;color:#bbb;margin-top:2px}
.ops-txn-show{display:flex;align-items:center;justify-content:center;padding:13px;border-top:1px solid #f5f5f7;font-size:13px;font-weight:700;color:var(--p);cursor:pointer;gap:5px;-webkit-tap-highlight-color:transparent}
.ops-txn-show svg{width:14px;height:14px;fill:none;stroke:var(--p);stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

/* ══════════════════════════════
   DARK THEME
   ══════════════════════════════ */
.dark-theme .iphone-screen{background:#121212}
.dark-theme .isc{background:#1c1c1e}
.dark-theme #s-home,.dark-theme .home-scroll{background:#1c1c1e}
.dark-theme #s-pay,.dark-theme #s-gov,.dark-theme #s-invest,.dark-theme #s-profile{background:#1c1c1e}
.dark-theme .ops-wrap,.dark-theme .prf-wrap,.dark-theme .msg-wrap{background:#1c1c1e}

/* Status bar & nav */
.dark-theme .status-bar{background:#1c1c1e}
.dark-theme .sb-time{color:#fff}
.dark-theme .sb-icons svg path,.dark-theme .sb-icons svg rect,.dark-theme .sb-icons svg circle{fill:#fff}
.dark-theme .sb-icons svg{stroke:none}
.dark-theme .bnav{background:#121212;border-top-color:rgba(255,255,255,.08)}
.dark-theme .bnav::before{content:'';position:absolute;bottom:0;left:0;right:0;height:100%;background:#121212;z-index:-1;border-radius:inherit}
.dark-theme .iphone-screen{background:#121212 !important}
.dark-theme .bni{color:#48484a}
.dark-theme .home-ind{background:#fff}

/* Page titles */
.dark-theme .ops-hd-title,.dark-theme .msg-hd-title{color:#fff}

/* White cards → dark cards */
.dark-theme .post-card,
.dark-theme .exch-card,
.dark-theme .rates-card,
.dark-theme .mybank,
.dark-theme .ops-section,
.dark-theme .ops-act-card,
.dark-theme .prf-section,
.dark-theme .prf-top,
.dark-theme .prf-logout,
.dark-theme .msg-card,
.dark-theme .msg-support,
.dark-theme .gov-quick-card,
.dark-theme .gov-cat-section,
.dark-theme .gov-search,
.dark-theme .ops-search{background:#2c2c2e;box-shadow:none}

/* Text – primary */
.dark-theme .post-org,
.dark-theme .post-body,
.dark-theme .exch-input,
.dark-theme .rate-code,
.dark-theme .prf-name,
.dark-theme .prf-row-name,
.dark-theme .ops-pay-name,
.dark-theme .ops-tr-lbl,
.dark-theme .msg-name,
.dark-theme .msg-support-name,
.dark-theme .gov-quick-name,
.dark-theme .gov-cat-lbl-txt,
.dark-theme .ops-act-name,

<script>
/* ── Navigation ── */
const SCREENS = ['home','pay','gov','invest','profile'];
let cur = 0;
let navigating = false;

function goTo(name) {
  const ni = SCREENS.indexOf(name);
  if (ni === cur || navigating) return;
  navigating = true;

  const dir = ni > cur ? 1 : -1;
  const ca = document.querySelector('.isc.active');
  const nx = document.getElementById('s-' + name);
  if (!ca || !nx) { navigating = false; return; }

  // position next screen off-screen instantly (no transition)
  nx.style.transition = 'none';
  nx.style.transform = `translateX(${dir * 100}%)`;

  // force reflow so browser commits position before enabling transition
  void nx.offsetWidth;

  // enable transitions and animate
  const ease = 'transform .34s cubic-bezier(.25,.46,.45,.94)';
  nx.style.transition = ease;
  ca.style.transition = ease;
  nx.style.transform = 'translateX(0)';
  ca.style.transform = `translateX(${dir * -28}%)`;

  ca.addEventListener('transitionend', function handler() {
    // FIX: clear transition BEFORE resetting transform to avoid ghost animation
    ca.style.transition = 'none';
    ca.style.transform = '';
    ca.classList.remove('active');

    nx.style.transition = 'none';
    nx.style.transform = '';
    nx.classList.add('active');
    nx.scrollTop = 0;
    navigating = false;
  }, { once: true });

  cur = ni;
  document.querySelectorAll('.bni').forEach(b => b.classList.toggle('active', b.dataset.sc === name));
  document.querySelectorAll('.tb-tab').forEach((t, i) => t.classList.toggle('active', i === ni));
  document.querySelector('.status-bar').style.background = name === 'home' ? '#f5f6f8' : '#fff';
}

/* ── Clock ── */
function updateClock() {
  const now = new Date();
  const h = now.getHours().toString().padStart(2,'0');
  const m = now.getMinutes().toString().padStart(2,'0');
  document.getElementById('clockEl').textContent = h + ':' + m;
}
updateClock();
setInterval(updateClock, 10000);

/* ── Exchange ── */
const RATES = { USD_NGN: 1580, USD_EUR: 0.92, USD_GBP: 0.79 };
let exchFrom = 'USD', exchTo = 'NGN';
function calcExchange() {
  const amt = parseFloat(document.getElementById('exch-from').value) || 0;
  const rate = exchFrom === 'USD' && exchTo === 'NGN' ? RATES.USD_NGN
             : exchTo === 'USD' && exchFrom === 'NGN' ? 1 / RATES.USD_NGN
             : 1;
  document.getElementById('exch-to').value = (amt * rate).toLocaleString('en', {maximumFractionDigits: 2});
  document.getElementById('exch-rate-lbl').textContent = `1 ${exchFrom} = ${rate.toLocaleString('en', {maximumFractionDigits: 4})} ${exchTo}`;
}
function swapCurrencies(btn) {
  [exchFrom, exchTo] = [exchTo, exchFrom];
  btn.style.transform = 'rotate(180deg)';
  setTimeout(() => btn.style.transform = '', 300);
  const fromEl = document.querySelector('.exch-row:first-child .exch-cur-code');
  const toEl   = document.querySelector('.exch-row:last-of-type .exch-cur-code');
  const fromFlag = document.querySelector('.exch-row:first-child .exch-flag-wrap');
  const toFlag   = document.querySelector('.exch-row:last-of-type .exch-flag-wrap');
  if (exchFrom === 'NGN') {
    fromEl.textContent = 'NGN'; fromEl.nextElementSibling.textContent = 'Nigerian Naira';
    fromFlag.textContent = '🇳🇬';
    toEl.textContent = 'USD'; toEl.nextElementSibling.textContent = 'US Dollar';
    toFlag.textContent = '🇺🇸';
  } else {
    fromEl.textContent = 'USD'; fromEl.nextElementSibling.textContent = 'US Dollar';
    fromFlag.textContent = '🇺🇸';
    toEl.textContent = 'NGN'; toEl.nextElementSibling.textContent = 'Nigerian Naira';
    toFlag.textContent = '🇳🇬';
  }
  calcExchange();
}

/* ── Toast ── */
let toastTimer;
function showToast(msg) {
  const el = document.getElementById('toastEl');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
}

/* ── Numpad (Pay screen) ── */
let amtRaw = '500';
function openNumpad() {
  amtRaw = '';
  updateAmt();
  document.getElementById('numpad').classList.add('show');
}
function closeNumpad() {
  if (!amtRaw || amtRaw === '0') amtRaw = '500';
  updateAmt();
  document.getElementById('numpad').classList.remove('show');
}
function npKey(k) {
  if (k === 'del') {
    amtRaw = amtRaw.slice(0, -1);
  } else {
    if (amtRaw.length >= 6) return;
    amtRaw += k;
  }
  updateAmt();
}
function updateAmt() {
  const v = amtRaw || '0';
  document.getElementById('amtDisplay').textContent = v;
  document.getElementById('sendAmt').textContent = v;
}

/* ── Contact selection ── */
function selectContact(el) {
  document.querySelectorAll('#s-pay .contact').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
  document.getElementById('recipientField').textContent = el.dataset.name;
}

/* ── Send flow ── */
function doSend() {
  const btn = document.getElementById('sendBtn');
  const amt = document.getElementById('amtDisplay').textContent;
  const recipient = document.getElementById('recipientField').textContent;
  btn.textContent = 'Sending...';
  btn.disabled = true;
  setTimeout(() => {
    document.getElementById('successSub').textContent = `$${amt} sent to ${recipient}`;
    const circle = document.getElementById('successCircle');
    circle.classList.remove('pop');
    void circle.offsetWidth;
    circle.classList.add('pop');
    document.getElementById('sendSuccess').classList.add('show');
    btn.textContent = `Send $${amt}.00 →`;
    btn.disabled = false;
  }, 1400);
}
function closeSendSuccess() {
  document.getElementById('sendSuccess').classList.remove('show');
  amtRaw = '500';
  updateAmt();
  goTo('home');
}

/* ── Gov tile click ── */
function govTileClick(tile) {
  if (tile.classList.contains('loading') || tile.classList.contains('done')) return;
  const stateEl = tile.querySelector('.gov-tile-state');
  stateEl.innerHTML = '<div class="gov-spinner"></div>Processing...';
  tile.classList.add('loading');
  setTimeout(() => {
    tile.classList.remove('loading');
    tile.classList.add('done');
    stateEl.innerHTML = '✓ Submitted';
    setTimeout(() => {
      tile.classList.remove('done');
      stateEl.innerHTML = '<div class="gov-spinner"></div>Processing...';
    }, 2500);
  }, 1500);
}

/* ── Dark / Light theme toggle ── */
function toggleTheme() {
  const screen = document.getElementById('phoneScreen');
  const body = document.body;
  const isDark = screen.classList.toggle('dark-theme');
  body.classList.toggle('dark-body', isDark);
  const btn = document.getElementById('themeToggle');
  const icon = document.getElementById('themeIcon');
  const lbl = document.getElementById('themeLabel');
  if (isDark) {
    lbl.textContent = 'Light';
    icon.innerHTML = '<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>';
    btn.style.background = '#1c1c1e';
    btn.style.color = '#fff';
    btn.style.borderColor = '#3a3a3c';
  } else {
    lbl.textContent = 'Dark';
    icon.innerHTML = '<path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>';
    btn.style.background = '#fff';
    btn.style.color = '#333';
    btn.style.borderColor = '#ddd';
  }
}

/* ── Chart period tabs ── */
document.querySelectorAll('.ops-chart-per').forEach(btn => {

/* ── Swipe gesture between screens ── */
(function() {
  const vp = document.querySelector('.screen-viewport');
  let startX = 0, startY = 0, locked = false;
  vp.addEventListener('touchstart', e => {
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
    locked = false;
  }, { passive: true });
  vp.addEventListener('touchend', e => {
    if (locked) return;
    const dx = e.changedTouches[0].clientX - startX;
    const dy = e.changedTouches[0].clientY - startY;
    if (Math.abs(dx) < 50 || Math.abs(dy) > Math.abs(dx)) return;
    if (dx < 0 && cur < SCREENS.length - 1) goTo(SCREENS[cur + 1]);
    if (dx > 0 && cur > 0) goTo(SCREENS[cur - 1]);
  }, { passive: true });
  vp.addEventListener('touchmove', e => {
    const dy = Math.abs(e.touches[0].clientY - startY);
    const dx = Math.abs(e.touches[0].clientX - startX);
    if (dy > dx) locked = true;
  }, { passive: true });
})();

    var fill = document.createElement('div');
    fill.className = 'bnav-fill';
    screen.appendChild(fill);
    /* bottom nav */
    var nav = document.createElement('div');
    nav.className = 'bnav';
    NAV_ITEMS.forEach(function(item, i) {
      var btn = document.createElement('div');
      btn.className = 'bni' + (i === activeNavIdx ? ' active' : '');
      btn.setAttribute('onclick', "showToast('Use the main phone above to navigate')");
      var inner = document.createElement('div');
      inner.className = 'bni-inner';
      if (i === activeNavIdx) {
        inner.style.cssText = 'background:linear-gradient(135deg,#D4830A,#F2C94C);border-radius:14px;padding:6px 14px;box-shadow:0 4px 14px rgba(212,131,10,.4)';
        btn.style.color = '#fff';
      }
      inner.innerHTML = '<svg viewBox="0 0 24 24">' + item.svg + '</svg><div class="bni-lbl">' + item.lbl + '</div>';
      btn.appendChild(inner);
      nav.appendChild(btn);
    });
    screen.appendChild(nav);
    /* home indicator */
    var ind = document.createElement('div');
    ind.className = 'home-ind';
    screen.appendChild(ind);
    phone.appendChild(screen);
    wrap.appendChild(phone);
    return wrap;
  }

  function cloneContent(srcId, vpId) {
    var src = document.getElementById(srcId);
    var vp = document.getElementById(vpId);
    if (!src || !vp) return;
    var clone = src.cloneNode(true);
    clone.removeAttribute('id');
    clone.style.cssText = 'position:absolute;top:0;left:0;right:0;bottom:0;overflow-y:auto;overflow-x:hidden;background:inherit;transform:translateX(0);transition:none;scrollbar-width:none;';
    /* defuse ID conflicts */
    ['amtDisplay','sendAmt','sendBtn','sendSuccess','successSub','successCircle','recipientField','numpad','chartGrad'].forEach(function(id) {
      var el = clone.querySelector('#' + id);
      if (el) el.setAttribute('id', 'sp_' + id);
    });
    /* replace goTo with toast */
    clone.querySelectorAll('[onclick]').forEach(function(el) {
      var attr = el.getAttribute('onclick') || '';
      if (attr.indexOf('goTo(') !== -1) {
        el.setAttribute('onclick', "showToast('Use the main phone to navigate')");
      }
    });
    vp.appendChild(clone);
  }

  function init() {
    var row = document.getElementById('spRow');
    if (!row) return;
    var items = [
      { id: 'home',    nav: 0 },
      { id: 'pay',     nav: 1 },
      { id: 'gov',     nav: 2 },
      { id: 'invest',  nav: 3 },
      { id: 'profile', nav: 4 }
    ];
    items.forEach(function(item) {
      var spItem = document.createElement('div');
      spItem.className = 'sp-item';
      var lbl = document.createElement('div');
      lbl.className = 'sp-item-label';
      lbl.textContent = SCREEN_LABELS[item.id];
      spItem.appendChild(lbl);
      spItem.appendChild(buildPhone(item.id, item.nav));
      row.appendChild(spItem);
      cloneContent('s-' + item.id, 'spvp-' + item.id);
    });

    /* add onboarding screen previews */
    var obSlides = [
      {
        label: 'Onboarding 1',
        grad: 'linear-gradient(160deg,#0FA84E,#1DD16A 50%,#0FA84E)',
        badge: 'SuperApp Africa',
        title: 'Banking on<br>your phone',
        photo: '/photos/c67881c0dbb873b1970d95321a5c7e92.jpg',
        inner: 'Fast &amp; secure service.',
        sub: 'Transfers &amp; payments across Africa.'
      },
      {
        label: 'Onboarding 2',
        grad: 'linear-gradient(160deg,#0A7A6E,#13A896 50%,#0A7A6E)',
        badge: 'Gov Services',
        title: 'Government<br>in your pocket',
        photo: '/photos/232fa43ef3485bbe8b3ef21f4f71ec65.jpg',
        inner: 'No queues.<br>No office visits.',
        sub: 'Documents &amp; taxes online.'
      },
      {
        label: 'Onboarding 3',
        grad: 'linear-gradient(160deg,#1A3A6E,#1E52AA 50%,#1A3A6E)',
        badge: '40M+ Users',
        title: 'Your financial<br>future starts today',
        photo: '/photos/5c7bbe95709e909fe2b08cc5866f7337.jpg',
        inner: 'Join 40 million<br>Africans.',
        sub: 'Money, wealth &amp; gov — one app.'
      }
    ];

    obSlides.forEach(function(ob) {
      var spItem = document.createElement('div');
      spItem.className = 'sp-item';

      var lbl = document.createElement('div');
      lbl.className = 'sp-item-label';
      lbl.textContent = ob.label;
      spItem.appendChild(lbl);

      var wrap = document.createElement('div');
      wrap.className = 'sp-phone-wrap';
      var phone = document.createElement('div');
      phone.className = 'iphone16';
      phone.innerHTML = '<div class="sb-mute"></div><div class="sb-vol-up"></div><div class="sb-vol-dn"></div><div class="sb-power"></div>';

      var screen = document.createElement('div');
      screen.className = 'iphone-screen sp-ob-screen';
      screen.style.cssText = 'background:' + ob.grad + ';overflow:hidden;position:relative;display:flex;flex-direction:column;';

      screen.innerHTML =
        '<div class="dynamic-island"><div class="di-cam"></div></div>' +
        '<div style="position:absolute;top:0;left:0;right:0;height:54px;display:flex;align-items:flex-end;justify-content:space-between;padding:0 26px 10px;z-index:25;background:transparent">' +
          '<span style="font-size:15px;font-weight:700;color:#fff;letter-spacing:-.3px">9:41</span>' +
          '<div style="display:flex;gap:4px;align-items:center">' +
            '<svg width="13" height="10" viewBox="0 0 17 12" fill="#fff" opacity=".9"><rect x="0" y="8.5" width="3" height="3.5" rx="1"/><rect x="4.5" y="5.5" width="3" height="6.5" rx="1"/><rect x="9" y="2.5" width="3" height="9.5" rx="1"/><rect x="13.5" y="0" width="3" height="12" rx="1"/></svg>' +
            '<svg width="13" height="10" viewBox="0 0 24 12" fill="none"><rect x="0" y="1" width="20" height="10" rx="2" stroke="#fff" stroke-opacity=".8" stroke-width="1.5"/><rect x="1.5" y="2.5" width="14" height="7" rx="1" fill="#fff" opacity=".8"/></svg>' +
          '</div>' +
        '</div>' +
        '<div style="position:absolute;top:0;left:0;right:0;bottom:0;pointer-events:none;overflow:hidden;border-radius:inherit">' +
          '<div style="position:absolute;width:420px;height:420px;top:-130px;right:-110px;border-radius:50%;background:rgba(255,255,255,.06)"></div>' +
          '<div style="position:absolute;width:300px;height:300px;bottom:-70px;left:-90px;border-radius:50%;background:rgba(255,255,255,.04)"></div>' +
        '</div>' +
        '<div style="position:relative;z-index:2;padding:60px 22px 0;flex-shrink:0">' +
          '<div style="display:inline-block;background:rgba(255,255,255,.18);color:#fff;font-size:10px;font-weight:700;padding:4px 10px;border-radius:20px;letter-spacing:.5px;backdrop-filter:blur(8px);margin-bottom:10px">' + ob.badge + '</div>' +
          '<div style="color:#fff;font-size:20px;font-weight:800;line-height:1.2;letter-spacing:-.3px">' + ob.title + '</div>' +
        '</div>' +
        '<div style="position:relative;z-index:2;flex:1;margin:14px 14px 0;border-radius:18px;overflow:hidden;min-height:0">' +
          '<img src="' + ob.photo + '" alt="" style="width:100%;height:100%;object-fit:cover;display:block">' +
          '<div style="position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.72) 0%,rgba(0,0,0,.1) 55%,transparent 100%)"></div>' +
          '<div style="position:absolute;bottom:0;left:0;right:0;padding:18px 16px 22px">' +
            '<div style="color:#fff;font-size:14px;font-weight:800;line-height:1.3;margin-bottom:5px">' + ob.inner + '</div>' +
            '<div style="color:rgba(255,255,255,.75);font-size:11px;line-height:1.4">' + ob.sub + '</div>' +
          '</div>' +
        '</div>' +
        '<div style="position:relative;z-index:2;padding:12px 22px 18px">' +
          '<div style="background:rgba(255,255,255,.22);backdrop-filter:blur(8px);border-radius:14px;padding:11px 18px;color:#fff;font-size:13px;font-weight:700;text-align:center;border:1px solid rgba(255,255,255,.25)">Next →</div>' +
        '</div>' +
        '<div style="height:20px"></div>';

      phone.appendChild(screen);
      wrap.appendChild(phone);
      spItem.appendChild(wrap);
      row.appendChild(spItem);
    });

    /* sync dark theme toggle to standalone phones */
    var origToggle = window.toggleTheme;
    window.toggleTheme = function() {
      origToggle && origToggle();
      var isDark = document.getElementById('phoneScreen').classList.contains('dark-theme');
      document.querySelectorAll('.sp-screen').forEach(function(s) {
        s.classList.toggle('dark-theme', isDark);
      });
    };
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();

</script>

<!-- ── STANDALONE SCREENS SECTION ── -->
<div class="sp-section">
  <div class="sp-section-head">
    <div class="sp-section-title">All Screens</div>
    <div class="sp-section-sub">Scroll to browse each screen as a standalone interactive phone</div>
    <div class="sp-divider"></div>
  </div>
  <div class="sp-row" id="spRow"></div>
</div>

</body>
</html>
